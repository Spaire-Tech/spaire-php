workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
    Spaire-OAS:
        inputs:
            - location: https://api.spairehq.com/openapi.json
        overlays:
            - location: https://raw.githubusercontent.com/spaire-tech/spaire/main/sdk/overlays/security.yml
            - location: https://raw.githubusercontent.com/spaire-tech/spaire/main/sdk/overlays/type_parameter.yml
            - location: https://raw.githubusercontent.com/spaire-tech/spaire/main/sdk/overlays/read_only.yml
            - location: https://raw.githubusercontent.com/spaire-tech/spaire/main/sdk/overlays/event_discriminator.yml
            - location: https://raw.githubusercontent.com/spaire-tech/spaire/main/sdk/overlays/timezone_enum.yml
            - location: https://raw.githubusercontent.com/spaire-tech/spaire/main/sdk/overlays/event_metadata.yml
        registry:
            location: registry.speakeasyapi.dev/spaire/spaire/spaire-oas
targets:
    spaire:
        target: php
        source: Spaire-OAS
        publish:
            packagist:
                username: spaire
                token: $packagist_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/spaire/spaire/spaire-api-php-code-samples
            labelOverride:
                fixedValue: PHP (SDK)
            blocking: false
